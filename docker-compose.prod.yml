version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: fjr-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fjruser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fjrpass}
      POSTGRES_DB: ${POSTGRES_DB:-fjrservices}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fjruser} -d ${POSTGRES_DB:-fjrservices}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fjr-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: fjr-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-fjrminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-fjrminiosecret}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - fjr-network

  # Backend API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: fjr-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-fjruser}:${POSTGRES_PASSWORD:-fjrpass}@db:5432/${POSTGRES_DB:-fjrservices}
      JWT_SECRET: ${JWT_SECRET:-tu-clave-secreta-muy-larga-aqui}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-tu-clave-refresh-secreta-aqui}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-fjrminio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-fjrminiosecret}
      MINIO_BUCKET_MEDIA: media
      MINIO_BUCKET_CLIENTS: client-media
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - fjr-network

  # Frontend (React SPA served by nginx)
  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_STORAGE_URL: /storage
    container_name: fjr-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - fjr-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.27-alpine
    container_name: fjr-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
      - minio
    networks:
      - fjr-network

volumes:
  postgres_data:
  minio_data:

networks:
  fjr-network:
    driver: bridge
